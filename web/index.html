<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>world simulator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%230b0e12%22 stroke=%22%233e8e8c%22 stroke-width=%226%22/><circle cx=%2250%22 cy=%2250%22 r=%2212%22 fill=%22%23d64541%22/></svg>" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="map"></div>
    <div id="hud">
      <span id="hud-title">world simulator</span>
      <span id="hud-right">
        <select id="lens">
          <option value="tone">lens: news tone</option>
          <option value="tension">lens: tension</option>
          <option value="attention">lens: attention</option>
          <option value="anomaly">lens: anomaly</option>
        </select>
        <button id="actors-toggle">actors</button>
        <button id="diff-toggle">24h diff</button>
        <button id="relation-toggle">relation mode</button>
        <span id="hud-status">loading&hellip;</span>
      </span>
    </div>
    <div id="relation-card" hidden></div>
    <div id="timebar">
      <input id="timeslider" type="range" min="0" max="96" value="96" />
      <span id="timelabel">live</span>
    </div>
    <aside id="storylines">
      <div id="storylines-heading">active storylines</div>
      <ol id="storyline-list"></ol>
      <div id="storyline-clear" hidden>&times; clear selection</div>
    </aside>
    <div id="legend">
      <div class="legend-section">
        <div class="legend-heading">events &middot; size = importance</div>
        <div><i class="dot" style="background:#d64541"></i> conflict &amp; coercion</div>
        <div><i class="dot" style="background:#3e8e8c"></i> cooperation &amp; aid</div>
        <div><i class="dot" style="background:#e07b39"></i> protest</div>
        <div><i class="dot" style="background:#6a7683"></i> statements, other</div>
      </div>
      <div class="legend-section" id="legend-countries"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
